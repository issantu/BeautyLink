name: omniflix
description: OmniFlix - Votre hub de divertissement universel. Films, TV en direct, et jeux vidéo.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.4
  youtube_player_flutter: ^9.0.2

  # Images
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # UI Components
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.0.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  url_launcher: ^6.2.4
  intl: ^0.19.0
  timeago: ^3.6.1
  google_fonts: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.6
  # flutter_icons removed — incompatible with null safety

  # WebView (pour vavoo.to et romsfun.com)
  flutter_inappwebview: ^6.0.0

  # VPN
  openvpn_flutter: ^1.3.3

  # Casting Chromecast / Google TV
  cast: ^2.1.0

  # Analytics
  firebase_core: ^2.27.0
  firebase_analytics: ^10.8.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
