name: omniflix
description: OmniFlix - Votre hub de divertissement universel. Films, TV en direct, et jeux vidéo.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Video Player
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Images
  cached_network_image: ^3.3.1

  # UI Components
  google_fonts: ^6.1.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  url_launcher: ^6.2.4
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

  # WebView (vavoo.to & romsfun.com)
  flutter_inappwebview: ^6.0.0

  # Casting Chromecast / Google TV
  cast: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
