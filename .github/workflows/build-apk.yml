name: Build OmniFlix APK (Android)

on:
  push:
    branches:
      - main
      - claude/**
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Regenerate native platform scaffolding
        # `flutter create .` only adds MISSING platform files (gradle wrapper,
        # MainActivity, mipmap launcher icons, AppDelegate, Podfile, Runner.xcodeproj…)
        # without touching customized files like AndroidManifest.xml, Info.plist or lib/.
        run: |
          flutter create . \
            --platforms=android,ios \
            --org com.omniflix \
            --project-name omniflix \
            --description "OmniFlix - Hub de divertissement"

      - name: Remove stale lockfile
        run: rm -f pubspec.lock

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings --no-fatal-infos
        continue-on-error: true

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniflix-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
            echo "## Build APK reussi" >> $GITHUB_STEP_SUMMARY
            echo "**APK:** app-debug.apk ($APK_SIZE)" >> $GITHUB_STEP_SUMMARY
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
            echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Telechargez l'APK dans l'onglet **Artifacts** ci-dessus." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build echoue" >> $GITHUB_STEP_SUMMARY
            echo "Verifiez les logs du job pour identifier le probleme." >> $GITHUB_STEP_SUMMARY
          fi
